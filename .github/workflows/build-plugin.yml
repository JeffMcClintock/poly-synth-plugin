name: Build & Release Poly Synth

# Push a version tag (e.g. v1.0.0) to build installers on Windows + macOS and
# publish them to a GitHub Release. Use "Run workflow" (workflow_dispatch) to
# do a dry build without releasing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Windows: export a VST3 with the headless SynthEditCL, wrap it in an Inno
  # Setup installer.
  # ---------------------------------------------------------------------------
  windows:
    name: Windows · VST3 + installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: powershell
        run: |
          $ref = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -eq "tag" -and $ref.StartsWith("v")) { $v = $ref.Substring(1) } else { $v = "0.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $v"

      - name: Install SynthEditCL + export templates
        timeout-minutes: 12
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          # 1. The headless exporter. SynthEditCL is a plain console app (no MSIX),
          #    so it installs cleanly and silently and exports without a GUI.
          Write-Host "Downloading SynthEditCL ..."
          $clSetup = "$env:RUNNER_TEMP\SynthEditCL-Installer.exe"
          curl.exe -L --fail -o $clSetup https://synthedit.com/release_1_6/SynthEditCL-Installer.exe
          Start-Process -Wait -FilePath $clSetup -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART'
          $clExe = "C:\Program Files\SynthEditCL\SynthEditCL.exe"
          if (-not (Test-Path $clExe)) { throw "SynthEditCL did not install" }

          # 2. The VST3 export templates (se_vst3_64.dat etc.) only ship inside the
          #    FULL SynthEdit download, not the CL one. We don't need to *register*
          #    that MSIX - it just carries the files - so we pull the installer and
          #    extract its payload with innoextract, then copy the templates next to
          #    SynthEditCL, where it looks for them.
          Write-Host "Downloading SynthEdit (for the export templates) ..."
          $seSetup = "$env:RUNNER_TEMP\SynthEdit-Setup.exe"
          curl.exe -L --fail -o $seSetup https://synthedit.com/release_1_6/SynthEdit-Setup.exe

          choco install innoextract -y --no-progress | Out-Null
          $msix = $null
          try {
            & innoextract --output-dir "$env:RUNNER_TEMP\se" "$seSetup" 2>&1 | Out-Null
            $msix = Get-ChildItem "$env:RUNNER_TEMP\se" -Recurse -Filter "SynthEdit2_*.msix" -ErrorAction SilentlyContinue | Select-Object -First 1
          } catch { Write-Host "innoextract failed: $($_.Exception.Message)" }

          # Fallback: run the installer and grab the MSIX it unpacks to TEMP before
          # it cleans up (the file sits there while its registration step runs/fails).
          if (-not $msix) {
            Write-Host "innoextract didn't yield the MSIX; capturing it from the installer temp dir ..."
            $p = Start-Process -PassThru -FilePath $seSetup -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART'
            $deadline = (Get-Date).AddMinutes(4)
            while (-not $msix -and (Get-Date) -lt $deadline) {
              $cand = Get-ChildItem "$env:TEMP\is-*.tmp" -Recurse -Filter "SynthEdit2_*.msix" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($cand -and $cand.Length -gt 50MB) {
                Start-Sleep -Seconds 2
                if ((Get-Item $cand.FullName).Length -eq $cand.Length) {
                  Copy-Item $cand.FullName "$env:RUNNER_TEMP\se.msix" -Force
                  $msix = Get-Item "$env:RUNNER_TEMP\se.msix"
                }
              }
              if (-not $msix) { Start-Sleep -Seconds 2 }
            }
            if ($p -and -not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue }
            Get-Process SynthEdit2 -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          }
          if (-not $msix) { throw "Could not obtain the SynthEdit MSIX to extract templates from" }

          # An MSIX is just a zip - extract the templates folder out of it.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $msixDir = "$env:RUNNER_TEMP\msix"
          if (Test-Path $msixDir) { Remove-Item $msixDir -Recurse -Force }
          [System.IO.Compression.ZipFile]::ExtractToDirectory($msix.FullName, $msixDir)
          $tpl = Join-Path $msixDir "Resources\templates"
          if (-not (Test-Path "$tpl\se_vst3_64.dat")) { throw "templates not found inside the MSIX ($tpl)" }
          $clTpl = "C:\Program Files\SynthEditCL\Resources\templates"
          New-Item -ItemType Directory -Force $clTpl | Out-Null
          Copy-Item "$tpl\*" $clTpl -Recurse -Force
          Write-Host "Templates staged next to SynthEditCL."

      - name: Export VST3 (headless)
        timeout-minutes: 6
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $proj = "$env:GITHUB_WORKSPACE\poly_synth.synthedit"
          # SynthEdit writes the bundle here and ABORTS if the folder is missing.
          $vst3Dir = "C:\Program Files\Common Files\VST3"
          New-Item -ItemType Directory -Force $vst3Dir | Out-Null

          # SynthEditCL is a console app: it exports headless and exits cleanly.
          $clExe = "C:\Program Files\SynthEditCL\SynthEditCL.exe"
          & $clExe "$proj" -rescan -autosavevst3 -quiet

          $bundle = Join-Path $vst3Dir "Poly Synth.vst3"
          $win = Join-Path $bundle "Contents\x86_64-win\Poly Synth.vst3"
          if (-not (Test-Path $win)) { throw "Export did not produce the Windows binary" }
          Write-Host "Exported:"; Get-ChildItem $bundle | Select-Object Name

          # Stage the bundle into the workspace so the installer script can find it.
          $stage = "$env:GITHUB_WORKSPACE\build"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item $bundle $stage -Recurse -Force

      - name: Build installer (Inno Setup)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found - installing via Chocolatey ..."
            choco install innosetup -y --no-progress
          }
          & $iscc "/DAppVersion=${{ steps.ver.outputs.version }}" "installer\windows\poly_synth.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/out/*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS: export VST3 + AU with SynthEdit, wrap them in a .pkg installer.
  # ---------------------------------------------------------------------------
  macos:
    name: macOS · VST3 + AU + .pkg
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          if [ "${{ github.ref_type }}" = "tag" ] && [ "${REF#v}" != "$REF" ]; then V="${REF#v}"; else V="0.0.0"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version $V"

      - name: Install SynthEdit from DMG
        run: |
          set -euo pipefail
          curl -L --fail -o "$RUNNER_TEMP/SynthEdit.dmg" https://synthedit.com/release_1_6/SynthEdit-Installer.dmg
          hdiutil attach "$RUNNER_TEMP/SynthEdit.dmg" -nobrowse -mountpoint /Volumes/SynthEdit
          sudo cp -R /Volumes/SynthEdit/SynthEdit.app /Applications/
          hdiutil detach /Volumes/SynthEdit
          sudo xattr -dr com.apple.quarantine /Applications/SynthEdit.app || true

      - name: Export VST3 + AU (headless)
        run: |
          set -euo pipefail
          # SynthEdit exports into the per-user plugin folders and aborts if they are missing.
          mkdir -p "$HOME/Library/Audio/Plug-Ins/VST3"
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          /Applications/SynthEdit.app/Contents/MacOS/SynthEdit "$GITHUB_WORKSPACE/poly_synth.synthedit" -rescan -autosavevst -quiet
          echo "--- VST3 ---";       ls -la "$HOME/Library/Audio/Plug-Ins/VST3"
          echo "--- Components ---";  ls -la "$HOME/Library/Audio/Plug-Ins/Components"
          test -d "$HOME/Library/Audio/Plug-Ins/VST3/Poly Synth.vst3"
          test -d "$HOME/Library/Audio/Plug-Ins/Components/Poly Synth.component"

      - name: Build installer (.pkg)
        run: |
          chmod +x installer/macos/build-pkg.sh
          ./installer/macos/build-pkg.sh "${{ steps.ver.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: build/out/*.pkg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release: attach both installers to a GitHub Release (tags only).
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [windows, macos]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - run: find dist -type f
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows-installer/*
            dist/macos-installer/*
          generate_release_notes: true
          fail_on_unmatched_files: true
